name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Sdrberry
title: "[Bug]: "
labels: ["bug", "triage", "need more information"]
assignees:
  - paulh002
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us diagnose the issue.

  - type: textarea
    id: description
    attributes:
      label: Detailed Description
      description: Please describe the issue in detail. What happened? What did you expect to happen? Include steps to reproduce if possible.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: raspberry_pi_model
    attributes:
      label: Raspberry Pi Model
      description: Which Raspberry Pi model are you using?
      options:
        - "Raspberry Pi 5"
        - "Raspberry Pi 4 Model B"
        - "Raspberry Pi 400"
        - "Compute Module 4"
        - "Other (specify in description)"
    validations:
      required: true

  - type: input
    id: memory
    attributes:
      label: Raspberry Pi Memory (RAM)
      description: How much RAM does your Raspberry Pi have?
      placeholder: "e.g., 2GB, 4GB, 8GB"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: Raspberry Pi OS Version
      description: What OS version are you running? (e.g., Raspberry Pi OS Trixie 64-bit)
      placeholder: "e.g., Raspberry Pi OS Trixie 64-bit"
    validations:
      required: true

  - type: input
    id: sdr_device
    attributes:
      label: SDR Device
      description: Which SDR hardware are you using? (e.g., Radioberry, RTL-SDR Blog V4, HackRF One, SDRplay RSP1A)
      placeholder: "e.g., Radioberry"
    validations:
      required: true

  - type: input
    id: sdrberry_version
    attributes:
      label: Sdrberry Version
      description: Which version or commit hash of Sdrberry are you running?
      placeholder: "e.g., v1.2.0 or commit abc1234"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output (Optional)
      description: If applicable, paste relevant log output here. Please wrap in ```triple backticks``` for formatting.
      render: shell

  - type: markdown
    attributes:
      value: |
        ### 📎 Attach Log Files
        You can upload log files directly to this issue by dragging and dropping them into the text area below, or by clicking "Attach files by dragging & dropping, selecting or pasting them."

        Common helpful logs:
        - `sdrberry.log`
        - `dmesg` output
        - `lsusb` output

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this hasn't been reported before
          required: true
        - label: I have tested with the latest version of Sdrberry
          required: false
        - label: I have included all relevant hardware and software details above
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or information that might help us understand the issue.